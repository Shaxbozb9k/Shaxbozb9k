<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <form action="#" method="get">
        <div>
            <label for="input1">Your name</label>
            <input type="text" id="input1">
        </div>
        <div>
            <label for="input2">Your surename</label>
            <input type="text" id="input2" placeholder="Familiya">
        </div>
        <div>
            <label for="input3">Your surename</label>
            <input type="email" id="input3" placeholder="Email">
        </div>

        <div>
            <label for="input4">Your password</label>
            <input type="password" id="input4" >
        </div>
        <div>
            <label for="input5">Your telephone number</label>
            <input type="number" id="input5" placeholder="Familiya">
        </div>

        <div>
            <label for="input6">Your Birthday</label>
            <input type="data" id="input6" >
        </div>

        <div>
            <label for="input7" class="document">Choose Document</label>
            <input type="file" id="input7" accept=".doc , .pdf , .jpg , .svg">
        </div>
        <div>
            <label for="input8">Your region</label>
            <select  id="input8">
                <option > Fargona </option>
                <option > Toshkent </option>
                <option > Surxandaryo </option>
            </select>
        </div>

        <div>
            Choose color:
            <label for="input9">Red</label>
            <input type="checkbox" id="input9">

            <label for="input10">Dark</label>
            <input type="checkbox" id="input10">

            <label for="input11">Yellow</label>
            <input type="checkbox" id="input9">
        </div>

        <div>
            Choose gender:

            <label for="input12">Male</label>
            <input type="radio" id="input12" name="jismi">

            <label for="input13">Female</label>
            <input type="radio" id="input13" name="jismi">
        </div>

        <div>
            <label for="input14">About yourself</label>
            
        </div>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
        <button type="button">Button</button>
    </form>
</body>

</html>
