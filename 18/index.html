    <script>			// Сценарий на JavaScript

        // Определение функции для отображения текущего времени 
        function displayMonth() {
            var element = document.getElementById("month"); // Найти элемент с id="clock" 
            var now = new Date();	// Получить текущее время
            data.getDay(now);
            element.innerHTML = now.toLocaleDateString(); // Отобразить его 
            element.innerHTML = now.toLocaleTimeString(); // Отобразить его 
            setTimeout(displayMonth, 1000);	// Вызвать снова через 5 сек
        }
        
        window.onload = displayMonth; // Начать отображение времени после загрузки документа
        
        </script>
