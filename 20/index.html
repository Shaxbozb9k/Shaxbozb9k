<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="main.js">
        const date = new Date('September 20, 2020 11:10:05');
date.getTime();
// 1600589405000
date.getFullYear();
// 2020
date.getDate();
// 20
date.getDay();
// 0 (0 – означает Воскресенье, 1 - Понедельник)
date.getMonth();
// 8 (0 - Январь)
date.getHours();
// 11
date.getMinutes();
// 10
date.getSeconds();
// 5
date.getMilliseconds();
// 0
date.getTimezoneOffset();
// -180 (указана разница между локальным и UTC временем в минутах)
    </script>
</body>
</html>
