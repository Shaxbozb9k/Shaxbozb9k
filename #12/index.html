<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lessons 16 Bootstrap</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
</head>

<body>
    <!-- block forma  -->
    <div class="container">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center">Mijoz haqida ma`limot</h1>
                <form action="">
                    <div class="form-group was-validated">
                        <div>
                            <label for="email">Email address:</label>
                            <input type="email" class="form-control" id="email">
                        </div>
                        <div class="mt-3">
                            <label for="psw">Password:</label>
                            <input type="password" class="form-control" id="psw" placeholder="**********">
                        </div>

                        <div class="form-group form-check mt-3">
                            <label class="form-check-label">Remember me:
                                <input type="checkbox" class=" form-check-input">
                            </label>
                        </div>
                    </div>
                    <div class="row was-validated">
                        <div class="col">
                            <input type="text" class="form-control mt-3" placeholder="Username" id="username"
                                name="username">
                        </div>
                        <div class="col">
                            <input type="text" class="form-control mt-3" placeholder="Surname" id="surname"
                                name="surname">
                        </div>
                    </div>
                    <div class="form-group was-validated">
                        <label for="address"> Address </label>
                        <input type="text" class="form-control" placeholder="Enter address" required>

                        <div class="valid-feedback">Valid</div>
                        <div class="invalid-feedback">Iltimos bu maydonni toldiring</div>
                    </div>
                    <div class="form-group was-validated mt-3">
                        <label class="form-check-label">
                            <input type="checkbox" class="form-check-input" id="checkbox" placeholder="Enter address"
                                required>
                            Men shartlarga roziman!

                            <div class="valid-feedback">Valid</div>
                            <div class="invalid-feedback">Malumotlaringizni tekshiring!</div><br>
                        </label>
                        <button type="submit" class="btn btn-success mt-3">Submit</button>
                </form>
            </div>


            <div class="col-12 my-3">
                <!-- Carousel -->
                <div id="demo" class="carousel slide" data-bs-ride="carousel">

                    <!-- Indicators/dots -->
                    <div class="carousel-indicators">
                        <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
                        <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
                        <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
                    </div>

                    <!-- The slideshow/carousel -->
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img src="img/i (1).webp" alt="Los Angeles" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="img/i (1.webp" alt="Chicago" class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="img/i (2).webp" alt="New York" class="d-block w-100">
                        </div>
                    </div>

                    <!-- Left and right controls/icons -->
                    <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>
                    <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>

            <div class="col-12 my-5">
                <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">
                    Open modal
                </button>

                <!-- The Modal -->
                <div class="modal fade" id="myModal">
                    <div class="modal-dialog">
                        <div class="modal-content">

                            <!-- Modal Header -->
                            <div class="modal-header">
                                <h4 class="modal-title">Modal Heading</h4>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <!-- Modal body -->
                            <div class="modal-body">
                                Modal body..
                            </div>

                            <!-- Modal footer -->
                            <div class="modal-footer">
                                <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                            </div>

                        </div>
                    </div>
                </div>


                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"
                    integrity="sha384-pprn3073KE6tl6bjs2QrFaJGz5/SUsLqktiwsUTF55Jfv3qYSDhgCecCxMW52nD2"
                    crossorigin="anonymous"></script>
</body>

</html>
